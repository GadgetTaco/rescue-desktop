<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RESCUE NextGen™</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #0d1117; overflow: hidden; }
iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<iframe id="frame" allow="autoplay; fullscreen"></iframe>
<script>
(function () {
  'use strict';

  const frame = document.getElementById('frame');

  // Receive config from main process and load RESCUE
  window.rescueApp.getConfig().then(function (cfg) {
    frame.src = cfg.nucUrl + '/rescue';
    document.getElementById('ver').textContent = 'v' + cfg.version;
  });

  // Forward update:ready IPC event into RESCUE iframe via postMessage
  window.rescueApp.onUpdateReady(function () {
    if (frame.contentWindow) {
      frame.contentWindow.postMessage({ type: 'updateReady' }, '*');
    }
  });

  // Listen for quit / installUpdate messages posted from RESCUE iframe
  window.addEventListener('message', function (e) {
    if (!frame.contentWindow || e.source !== frame.contentWindow) return;
    if (e.data && e.data.type === 'quit')          window.rescueApp.quit();
    if (e.data && e.data.type === 'installUpdate') window.rescueApp.installUpdate();
  });
})();
</script>
<!-- <span id="ver" style="display:none"></span> -->
</body>
</html>
