<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RESCUE NextGen™</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d1117;
  overflow: hidden;
  width: 100vw; height: 100vh;
  user-select: none;
  -webkit-user-select: none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* ── Full-screen iframe ── */
#frame {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
  z-index: 10;
}

/* ── Invisible hot zones ── */
#hz-top {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 6px;
  z-index: 300;
}
#hz-corner {
  position: fixed;
  top: 0; right: 0;
  width: 80px; height: 60px;
  z-index: 300;
}

/* ── Titlebar ── */
#titlebar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 40px;
  background: rgba(22, 27, 34, 0.97);
  border-bottom: 1px solid #30363d;
  z-index: 200;
  display: flex;
  align-items: center;
  padding: 0 10px;
  transform: translateY(-100%);
  transition: transform 0.22s ease;
}
#titlebar.visible { transform: translateY(0); }

#nuc-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #f0883e;
  margin-right: 9px;
  flex-shrink: 0;
  transition: background 0.3s;
}
#nuc-dot.healthy { background: #3fb950; animation: pulse 2s infinite; }
#nuc-dot.error   { background: #f85149; animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

#site-name {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  color: #e6edf3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#menu-btn {
  position: relative;
  width: 36px; height: 36px;
  background: none;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#menu-btn:hover { background: #21262d; }
#menu-btn svg { pointer-events: none; }

#update-badge {
  position: absolute;
  top: 5px; right: 5px;
  width: 7px; height: 7px;
  background: #f0883e;
  border-radius: 50%;
  display: none;
}
#update-badge.show { display: block; }

/* ── Side menu ── */
#menu-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 390;
  display: none;
}
#menu-overlay.show { display: block; }

#menu {
  position: fixed;
  top: 0; right: 0;
  width: 280px; height: 100%;
  background: #161b22;
  border-left: 1px solid #30363d;
  z-index: 400;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
}
#menu.open { transform: translateX(0); }

.mhdr {
  padding: 20px 18px 16px;
  border-bottom: 1px solid #30363d;
}
.mhdr-site {
  font-size: 16px;
  font-weight: 700;
  color: #e6edf3;
  margin-bottom: 3px;
}
.mhdr-ver { font-size: 12px; color: #8b949e; }

.mbody { flex:1; padding: 18px; overflow-y: auto; }

.msec-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: #8b949e;
  margin-bottom: 12px;
}

.hrow {
  display: flex;
  align-items: center;
  font-size: 13px;
  color: #c9d1d9;
  margin-bottom: 10px;
}
.hdot {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 10px;
  flex-shrink: 0;
  background: #484f58;
}
.hdot.ok   { background: #3fb950; }
.hdot.warn { background: #f0883e; }
.hdot.err  { background: #f85149; }

.mbtn {
  width: 100%;
  padding: 11px 14px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
  text-align: left;
}
#btn-update { background:#f0883e; color:#fff; display:none; }
#btn-update.show { display:block; }
#btn-quit { background:#21262d; color:#c9d1d9; border:1px solid #30363d; }
#btn-quit:hover { background:#30363d; }

/* ── Splash ── */
#splash {
  position: fixed; inset: 0;
  background: #0d1117;
  z-index: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity .4s;
}
#splash.hidden { opacity:0; pointer-events:none; }

.sp-logo {
  font-size: 11px; font-weight: 700;
  letter-spacing: .15em; text-transform: uppercase;
  color: #58a6ff; margin-bottom: 12px;
}
.sp-title {
  font-size: 28px; font-weight: 700;
  color: #e6edf3; margin-bottom: 8px;
}
.sp-status { font-size: 13px; color: #8b949e; margin-bottom: 28px; }

.spinner {
  width: 26px; height: 26px;
  border: 2px solid #21262d;
  border-top-color: #58a6ff;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

#sp-retry {
  margin-top: 22px;
  padding: 8px 24px;
  background: #21262d;
  border: 1px solid #30363d;
  color: #c9d1d9;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  display: none;
}

/* ── Offline overlay ── */
#offline {
  position: fixed; inset: 0;
  background: rgba(13,17,23,.9);
  z-index: 80;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
#offline.show { display:flex; }
.off-icon { font-size: 38px; margin-bottom: 14px; }
.off-title { font-size: 20px; font-weight: 700; color: #e6edf3; margin-bottom: 6px; }
.off-msg   { font-size: 14px; color: #8b949e; margin-bottom: 6px; }
.off-cd    { font-size: 13px; color: #484f58; }
</style>
</head>
<body>

<iframe id="frame" allow="autoplay; fullscreen"></iframe>

<div id="hz-top"></div>
<div id="hz-corner"></div>

<div id="titlebar">
  <div id="nuc-dot"></div>
  <div id="site-name">RESCUE NextGen™</div>
  <button id="menu-btn" aria-label="Menu">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
      <rect x="0" y="0"  width="18" height="2" rx="1" fill="#e6edf3"/>
      <rect x="0" y="6"  width="18" height="2" rx="1" fill="#e6edf3"/>
      <rect x="0" y="12" width="18" height="2" rx="1" fill="#e6edf3"/>
    </svg>
    <div id="update-badge"></div>
  </button>
</div>

<div id="menu-overlay"></div>
<div id="menu">
  <div class="mhdr">
    <div class="mhdr-site" id="m-site">RESCUE NextGen™</div>
    <div class="mhdr-ver"  id="m-ver">—</div>
  </div>
  <div class="mbody">
    <div class="msec-title">System Health</div>
    <div class="hrow"><div class="hdot" id="h-api"></div>Backend API</div>
    <div class="hrow"><div class="hdot" id="h-db"></div>Database</div>
    <div class="hrow"><div class="hdot" id="h-mqtt"></div>MQTT Broker</div>
    <div class="hrow"><div class="hdot" id="h-vpn"></div>VPN Remote</div>
    <button class="mbtn" id="btn-update" onclick="installUpdate()">⬆ Install Update</button>
    <button class="mbtn" id="btn-quit"   onclick="quitApp()">Quit RESCUE NextGen</button>
  </div>
</div>

<div id="splash">
  <div class="sp-logo">GadgetTaco LLC</div>
  <div class="sp-title">RESCUE NextGen™</div>
  <div class="sp-status" id="sp-status">Connecting to training server…</div>
  <div class="spinner" id="spinner"></div>
  <button id="sp-retry" onclick="retryConnect()">Retry</button>
</div>

<div id="offline">
  <div class="off-icon">⚠️</div>
  <div class="off-title">Connection Lost</div>
  <div class="off-msg">Cannot reach the training server.</div>
  <div class="off-cd" id="off-cd">Retrying in 10s…</div>
</div>

<script>
(function () {
  'use strict';

  let nucUrl       = 'https://192.168.50.1';
  let connected    = false;
  let failCount    = 0;
  let tbTimer      = null;
  let touchStartY  = null;
  let retryTimer   = null;

  const $ = id => document.getElementById(id);

  const frame     = $('frame');
  const titlebar  = $('titlebar');
  const nucDot    = $('nuc-dot');
  const siteName  = $('site-name');
  const splash    = $('splash');
  const spStatus  = $('sp-status');
  const spRetry   = $('sp-retry');
  const spinner   = $('spinner');
  const offline   = $('offline');
  const offCd     = $('off-cd');
  const badge     = $('update-badge');
  const btnUpdate = $('btn-update');

  // ── Config ──────────────────────────────────────────────────────────────
  window.rescueApp.getConfig().then(cfg => {
    nucUrl = cfg.nucUrl;
    $('m-ver').textContent = 'v' + cfg.version + ' · AWARE™ Edge';
    startHealthCheck();
  });

  // ── Health ───────────────────────────────────────────────────────────────
  function dot (id, status) {
    $(id).className = 'hdot ' + (
      status === 'healthy' ? 'ok' :
      status === 'degraded' ? 'warn' :
      status === 'down'     ? 'err' : ''
    );
  }

  async function checkHealth () {
    try {
      const res  = await fetch(nucUrl + '/api/v1/health', { cache: 'no-store' });
      const data = await res.json();
      if (!data || !data.status) throw new Error('bad payload');

      const svc = {};
      (data.services || []).forEach(s => { svc[s.name] = s.status; });

      dot('h-api',  svc['Backend'] || 'down');
      dot('h-db',   svc['PostgreSQL'] || 'down');
      dot('h-mqtt', svc['MQTT'] || 'down');
      dot('h-vpn',  svc['VPN Remote Support'] || 'down');

      const name = data.site || 'RESCUE NextGen™';
      siteName.textContent = name;
      $('m-site').textContent = name;
      nucDot.className = 'healthy';
      failCount = 0;

      if (!connected) {
        connected = true;
        frame.src = nucUrl + '/rescue';
        spStatus.textContent = 'Connected — loading…';
        setTimeout(() => splash.classList.add('hidden'), 1800);
        offline.classList.remove('show');
        clearInterval(retryTimer);
      }
    } catch (e) {
      failCount++;
      nucDot.className = 'error';
      if (connected && failCount >= 2) {
        offline.classList.add('show');
        startRetryCountdown();
      } else if (!connected && failCount >= 3) {
        spStatus.textContent = 'Cannot reach training server';
        spRetry.style.display = 'block';
        spinner.style.display = 'none';
      }
    }
  }

  function startHealthCheck () {
    checkHealth();
    setInterval(checkHealth, 8000);
  }

  function startRetryCountdown () {
    let s = 10;
    clearInterval(retryTimer);
    offCd.textContent = 'Retrying in ' + s + 's…';
    retryTimer = setInterval(() => {
      s--;
      if (s <= 0) {
        clearInterval(retryTimer);
        offCd.textContent = 'Retrying…';
        checkHealth();
      } else {
        offCd.textContent = 'Retrying in ' + s + 's…';
      }
    }, 1000);
  }

  window.retryConnect = function () {
    spStatus.textContent = 'Connecting to training server…';
    spRetry.style.display = 'none';
    spinner.style.display = 'block';
    failCount = 0;
    checkHealth();
  };

  // ── Titlebar show / hide ─────────────────────────────────────────────────
  function showBar () {
    titlebar.classList.add('visible');
    $('hz-top').style.pointerEvents    = 'none';
    $('hz-corner').style.pointerEvents = 'none';
    resetTimer();
    checkHealth();
  }

  function hideBar () {
    titlebar.classList.remove('visible');
    clearTimeout(tbTimer);
    $('hz-top').style.pointerEvents    = '';
    $('hz-corner').style.pointerEvents = '';
  }

  function resetTimer () {
    clearTimeout(tbTimer);
    tbTimer = setTimeout(hideBar, 4000);
  }

  // Keep visible while mouse/touch is over titlebar
  titlebar.addEventListener('mouseenter', () => clearTimeout(tbTimer));
  titlebar.addEventListener('mouseleave', resetTimer);
  titlebar.addEventListener('touchstart',  () => clearTimeout(tbTimer), { passive: true });

  // Hot zone — thin top strip (mouse hover / touch)
  $('hz-top').addEventListener('mousemove', showBar);
  $('hz-top').addEventListener('touchstart', showBar, { passive: true });

  // Hot zone — top-right corner tap
  $('hz-corner').addEventListener('click', showBar);
  $('hz-corner').addEventListener('touchend', e => { e.preventDefault(); showBar(); });

  // Swipe down from top edge
  document.addEventListener('touchstart', e => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (touchStartY === null || touchStartY > 20) return;
    if (e.touches[0].clientY - touchStartY > 30) {
      showBar();
      touchStartY = null;
    }
  }, { passive: true });

  document.addEventListener('touchend', () => { touchStartY = null; }, { passive: true });

  // ── Hamburger button ─────────────────────────────────────────────────────
  $('menu-btn').addEventListener('click', () => {
    $('menu').classList.add('open');
    $('menu-overlay').classList.add('show');
    clearTimeout(tbTimer);      // keep titlebar visible while menu is open
    checkHealth();
  });

  $('menu-overlay').addEventListener('click', closeMenu);

  function closeMenu () {
    $('menu').classList.remove('open');
    $('menu-overlay').classList.remove('show');
    resetTimer();
  }

  // ── Update ───────────────────────────────────────────────────────────────
  window.rescueApp.onUpdateReady(() => {
    badge.classList.add('show');
    btnUpdate.classList.add('show');
  });

  window.rescueApp.checkUpdate().then(ready => {
    if (ready) { badge.classList.add('show'); btnUpdate.classList.add('show'); }
  });

  window.installUpdate = function () {
    closeMenu();
    window.rescueApp.installUpdate();
  };

  // ── Quit ─────────────────────────────────────────────────────────────────
  window.quitApp = function () {
    closeMenu();
    window.rescueApp.quit();
  };

})();
</script>
</body>
</html>
